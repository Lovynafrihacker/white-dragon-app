<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - White Dragon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0a0c1a;
            color: white;
            font-family: Arial;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            background: #1a2340;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #00ffff;
        }
        h1 {
            color: #00ffff;
            text-align: center;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            color: #ffd700;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #00ffff40;
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        button {
            background: linear-gradient(90deg, #00a6ff, #8a2be2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            opacity: 0.9;
        }
        .success {
            background: #00ff0040;
            border: 1px solid #00ff00;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .preview {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐉 WHITE DRAGON ADMIN</h1>
        
        <div id="successMsg" class="success">✅ Settings Updated Successfully!</div>
        
        <label>🔮 Prediction Text</label>
        <input type="text" id="predictionText" placeholder="e.g., BIG / SMALL" value="BIG">
        
        <label>📊 Confidence Level (%)</label>
        <input type="number" id="confidenceLevel" min="0" max="100" value="92">
        
        <label>🎨 Timer Color</label>
        <select id="timerColor">
            <option value="#00ffff">Cyan (Normal)</option>
            <option value="#ff4444">Red (Urgent)</option>
            <option value="#ffd700">Gold (Special)</option>
        </select>
        
        <label>📝 Reason Text</label>
        <textarea id="reasonText" rows="3">Pattern: 3 → 7 → 2 | Based on last 3 periods</textarea>
        
        <label>📋 Last 10 Results (JSON format)</label>
        <textarea id="historyData" rows="5">[
  {"number": "3", "color": "green"},
  {"number": "7", "color": "red"},
  {"number": "2", "color": "violet"}
]</textarea>
        
        <button onclick="updateWebsite()">🚀 UPDATE WEBSITE</button>
        <button onclick="previewChanges()" style="background: #1f2a44">👁️ PREVIEW CHANGES</button>
        
        <div id="previewArea" class="preview"></div>
    </div>

    <script>
        // GitHub Config - Apni info daalo
        const GITHUB_TOKEN = "YOUR_GITHUB_TOKEN"; // Step 5 mein banayenge
        const REPO_OWNER = "YOUR_USERNAME";
        const REPO_NAME = "white-dragon-app";
        const FILE_PATH = "index.html";
        
        function previewChanges() {
            const preview = document.getElementById('previewArea');
            preview.innerHTML = `
Prediction: ${document.getElementById('predictionText').value}
Confidence: ${document.getElementById('confidenceLevel').value}%
Timer Color: ${document.getElementById('timerColor').value}
Reason: ${document.getElementById('reasonText').value}
History: ${document.getElementById('historyData').value.substring(0, 50)}...
            `;
        }
        
        async function updateWebsite() {
            // 1. Pehle current file fetch karo
            const currentFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            const fileData = await currentFile.json();
            const content = atob(fileData.content); // Base64 decode
            
            // 2. Naya content banao
            let newContent = content;
            
            // Prediction change
            newContent = newContent.replace(
                /<div id="predictionDisplay"[^>]*>.*?<\/div>/,
                `<div id="predictionDisplay" class="prediction-display ${document.getElementById('predictionText').value.toLowerCase()}">${document.getElementById('predictionText').value}</div>`
            );
            
            // Confidence change
            newContent = newContent.replace(
                /CONFIDENCE: \d+%/,
                `CONFIDENCE: ${document.getElementById('confidenceLevel').value}%`
            );
            
            // Timer color change
            newContent = newContent.replace(
                /#00ffff/g,
                document.getElementById('timerColor').value
            );
            
            // 3. GitHub par update karo
            const updateResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Admin panel update",
                    content: btoa(newContent),
                    sha: fileData.sha
                })
            });
            
            if (updateResponse.ok) {
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
